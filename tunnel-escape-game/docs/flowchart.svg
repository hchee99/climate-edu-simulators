<svg viewBox="0 0 620 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="sans-serif">
<title>지하차도 탈출 게임 진행 플로우차트</title>
<desc>게임 시작부터 대피 준비, 물 차오름, 이동과 손잡이 판단, 출구 도착 또는 골든타임 초과 판정까지의 흐름.</desc>
<rect x="0" y="0" width="620" height="720" fill="#ffffff"/>
<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#666677"/></marker>
</defs>

<g><rect x="210" y="16" width="200" height="42" rx="21" fill="#e6f1fb" stroke="#85b7eb"/>
<text x="310" y="42" text-anchor="middle" font-size="14" font-weight="500" fill="#0c447c">게임 시작</text></g>
<line x1="310" y1="58" x2="310" y2="74" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<g><rect x="200" y="76" width="220" height="42" rx="8" fill="#e6f1fb" stroke="#85b7eb"/>
<text x="310" y="102" text-anchor="middle" font-size="13" fill="#0c447c">1초 대피 준비 (물 안 참)</text></g>
<line x1="310" y1="118" x2="310" y2="134" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<g><rect x="200" y="136" width="220" height="42" rx="8" fill="#e6f1fb" stroke="#85b7eb"/>
<text x="310" y="162" text-anchor="middle" font-size="13" fill="#0c447c">물이 차오름 (점점 빠르게)</text></g>
<line x1="310" y1="178" x2="310" y2="200" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<g><rect x="205" y="202" width="210" height="44" rx="8" fill="#efedfe" stroke="#7f77dd"/>
<text x="310" y="229" text-anchor="middle" font-size="13" font-weight="500" fill="#3c3489">캐릭터 이동 (좌 / 우 / 앞)</text></g>
<line x1="310" y1="246" x2="310" y2="266" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<g><rect x="200" y="268" width="220" height="56" rx="8" fill="#faeeda" stroke="#ef9f27"/>
<text x="310" y="291" text-anchor="middle" font-size="13" fill="#854f0b">물에 잠겼고</text>
<text x="310" y="309" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">가운데 길인가?</text></g>

<text x="430" y="290" font-size="12" fill="#8a5a12">예</text>
<line x1="420" y1="296" x2="470" y2="296" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>
<g><rect x="472" y="274" width="138" height="44" rx="8" fill="#e6f1fb" stroke="#85b7eb"/>
<text x="541" y="293" text-anchor="middle" font-size="12" fill="#0c447c">전진 막힘 →</text>
<text x="541" y="309" text-anchor="middle" font-size="12" fill="#0c447c">손잡이로 이동</text></g>
<polyline points="541,274 541,150 545,150" fill="none" stroke="#9aaab5" stroke-width="1.3" stroke-dasharray="4 3"/>
<polyline points="541,160 541,224 417,224" fill="none" stroke="#9aaab5" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ar)"/>

<text x="320" y="340" font-size="12" fill="#8a5a12">아니오</text>
<line x1="310" y1="324" x2="310" y2="354" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<g><rect x="220" y="356" width="180" height="50" rx="8" fill="#faeeda" stroke="#ef9f27"/>
<text x="310" y="386" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">출구에 도착?</text></g>

<text x="150" y="378" font-size="12" fill="#8a5a12">예</text>
<polyline points="220,381 130,381 130,640" fill="none" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<text x="320" y="424" font-size="12" fill="#8a5a12">아니오</text>
<line x1="310" y1="406" x2="310" y2="436" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<g><rect x="215" y="438" width="190" height="50" rx="8" fill="#faeeda" stroke="#ef9f27"/>
<text x="310" y="468" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">골든타임 초과?</text></g>

<text x="60" y="463" font-size="12" fill="#8a5a12">아니오</text>
<polyline points="215,463 70,463 70,224 205,224" fill="none" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<text x="430" y="463" font-size="12" fill="#8a5a12">예</text>
<polyline points="405,463 490,463 490,640" fill="none" stroke="#666677" stroke-width="1.5" marker-end="url(#ar)"/>

<g><rect x="40" y="642" width="180" height="48" rx="10" fill="#eaf3de" stroke="#639922"/>
<text x="130" y="665" text-anchor="middle" font-size="14" font-weight="500" fill="#27500a">탈출 성공</text>
<text x="130" y="682" text-anchor="middle" font-size="11" fill="#3b6d11">안전 행동요령 카드</text></g>

<g><rect x="400" y="642" width="180" height="48" rx="10" fill="#fcebeb" stroke="#e24b4a"/>
<text x="490" y="665" text-anchor="middle" font-size="14" font-weight="500" fill="#791f1f">실패</text>
<text x="490" y="682" text-anchor="middle" font-size="11" fill="#a32d2d">시간 초과 — 다시 도전</text></g>
</svg>
